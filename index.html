<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joaquin Latina — Fotografía Arquitectónica</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      cursor: none;
    }

    #stage {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }

    .slide.active  { opacity: 1; }
    .slide.leaving { opacity: 0; }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.45) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
    }

    #brand {
      position: fixed;
      top: 38px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 1.8s ease 0.6s forwards;
    }

    #brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.55rem);
      letter-spacing: 0.32em;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 1px 18px rgba(0,0,0,0.6);
      white-space: nowrap;
    }

    #brand p {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(0.55rem, 1.1vw, 0.7rem);
      letter-spacing: 0.48em;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      margin-top: 5px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.5);
    }

    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      padding: 20px 28px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #nav-prev { left: 0; }
    #nav-next { right: 0; }

    body:hover .nav-arrow { opacity: 1; }

    .nav-arrow svg {
      width: 20px;
      height: 40px;
      stroke: rgba(255,255,255,0.7);
      fill: none;
      stroke-width: 1.5;
      transition: stroke 0.2s;
    }

    .nav-arrow:hover svg { stroke: #fff; }

    #counter {
      position: fixed;
      bottom: 32px;
      right: 40px;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.45);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 1.8s ease 1.2s forwards;
    }

    #progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: rgba(255,255,255,0.55);
      z-index: 10;
      width: 0%;
      transition: width linear;
    }

    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.2s ease, height 0.2s ease, background 0.2s ease;
      mix-blend-mode: difference;
    }

    #cursor.over-nav {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.6);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #touch-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
      display: none;
      opacity: 0;
      animation: fadeIn 2s ease 2s forwards;
    }

    @media (hover: none) {
      #touch-hint { display: block; }
      #cursor { display: none; }
    }
  </style>
</head>
<body>

  <div id="stage"></div>

  <div id="brand">
    <h1>Joaquin Latina</h1>
    <p>Fotografía Arquitectónica</p>
  </div>

  <button class="nav-arrow" id="nav-prev" aria-label="Imagen anterior">
    <svg viewBox="0 0 20 40"><polyline points="15,5 5,20 15,35"/></svg>
  </button>

  <button class="nav-arrow" id="nav-next" aria-label="Imagen siguiente">
    <svg viewBox="0 0 20 40"><polyline points="5,5 15,20 5,35"/></svg>
  </button>

  <div id="counter"></div>
  <div id="progress"></div>
  <div id="touch-hint">deslizá para navegar</div>
  <div id="cursor"></div>

  <script>
    const BASE = "https://raw.githubusercontent.com/Bulkingup/slideshow/main/";

    const IMAGES = [
      BASE + "001Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "002Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "003Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "004Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "005Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "006Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "007Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "008Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "009Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "010Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "011Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "012Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "013Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "014Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "015Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "016Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "017Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "018Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "019Marco%20Bruto%20esq%20Rambla.jpg",
      BASE + "020Marco%20Bruto%20esq%20Rambla.jpg",
    ];

    const INTERVAL = 6000;

    const stage    = document.getElementById('stage');
    const counter  = document.getElementById('counter');
    const progress = document.getElementById('progress');
    const cursor   = document.getElementById('cursor');
    const navPrev  = document.getElementById('nav-prev');
    const navNext  = document.getElementById('nav-next');

    let current = 0;
    let timer   = null;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const order = shuffle([...Array(IMAGES.length).keys()]);
    const slides = [];

    IMAGES.forEach((src) => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.style.backgroundImage = `url(${src})`;
      stage.appendChild(div);
      slides.push(div);
    });

    function updateCounter() {
      counter.textContent = `${(current + 1).toString().padStart(2, '0')} / ${IMAGES.length.toString().padStart(2, '0')}`;
    }

    function startProgress() {
      progress.style.transition = 'none';
      progress.style.width = '0%';
      progress.offsetWidth; // force reflow
      progress.style.transition = `width ${INTERVAL}ms linear`;
      progress.style.width = '100%';
    }

    function goTo(idx) {
      slides[order[current]].classList.remove('active');
      current = ((idx % IMAGES.length) + IMAGES.length) % IMAGES.length;
      slides[order[current]].classList.add('active');
      updateCounter();
      clearTimeout(timer);
      timer = setTimeout(goNext, INTERVAL);
      startProgress();
    }

    function goNext() { goTo(current + 1); }
    function goPrev() { goTo(current - 1); }

    // init
    slides[order[0]].classList.add('active');
    updateCounter();
    timer = setTimeout(goNext, INTERVAL);
    startProgress();

    // preload next few
    [1, 2, 3].forEach(i => {
      if (i < IMAGES.length) {
        const img = new Image();
        img.src = IMAGES[order[i]];
      }
    });

    navNext.addEventListener('click', goNext);
    navPrev.addEventListener('click', goPrev);

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft')  goPrev();
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) dx < 0 ? goNext() : goPrev();
    });

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    [navPrev, navNext].forEach(btn => {
      btn.addEventListener('mouseenter', () => cursor.classList.add('over-nav'));
      btn.addEventListener('mouseleave', () => cursor.classList.remove('over-nav'));
    });
  </script>
</body>
</html>
